name: Build N3N

on:
  workflow_dispatch:
    inputs:
      repo_ref:
        description: Branch/tag to compile
        required: true
        default: "main"
      rel:
        description: Release type
        required: true
        default: none
        type: choice
        options: [none, release]
      tag:
        description: Release version tag
        required: false
        default: ""
      upx:
        description: Enable UPX compression
        required: true
        default: true
        type: boolean
      enable_zstd:
        description: Enable ZSTD compression
        default: true
        type: boolean
      enable_openssl:
        description: Enable OpenSSL encryption
        default: true
        type: boolean

concurrency:
  group: n3n-build-${{ inputs.repo_ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {target: aarch64-linux, cross: aarch64-linux-musl, openssl_target: linux-aarch64}
          - {target: x86_64-linux, cross: x86_64-linux-musl, openssl_target: linux-x86_64}
          - {target: mt7621, cross: mipsel-linux-muslsf, openssl_target: linux-mips32}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup musl cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            curl \
            wget

          # Download and setup musl cross-compiler
          MUSL_URL="https://musl.cc/${{ matrix.cross }}-cross.tgz"
          wget -q "$MUSL_URL" -O musl-cross.tgz
          tar xf musl-cross.tgz
          echo "PATH=$PWD/${{ matrix.cross }}-cross/bin:$PATH" >> $GITHUB_ENV

          # Set cross-compile variables
          echo "CC=${{ matrix.cross }}-gcc" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cross }}-g++" >> $GITHUB_ENV
          echo "AR=${{ matrix.cross }}-ar" >> $GITHUB_ENV
          echo "RANLIB=${{ matrix.cross }}-ranlib" >> $GITHUB_ENV
          echo "STRIP=${{ matrix.cross }}-strip" >> $GITHUB_ENV
          echo "HOST_triplet=${{ matrix.cross }}" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/deps
          key: deps-${{ matrix.target }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Build OpenSSL
        if: inputs.enable_openssl
        run: |
          mkdir -p ~/deps/openssl
          if [ ! -f ~/deps/openssl/lib/libssl.a ]; then
            wget -q https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz
            tar xf openssl-1.1.1w.tar.gz
            cd openssl-1.1.1w
            ./Configure ${{ matrix.openssl_target }} --prefix=$HOME/deps/openssl --cross-compile-prefix=${{ matrix.cross }}- no-shared
            make -j$(nproc)
            make install
          fi

      - name: Build ZSTD
        if: inputs.enable_zstd
        run: |
          mkdir -p ~/deps/zstd
          if [ ! -f ~/deps/zstd/lib/libzstd.a ]; then
            wget -q https://github.com/facebook/zstd/releases/download/v1.5.5/zstd-1.5.5.tar.gz
            tar xf zstd-1.5.5.tar.gz
            cd zstd-1.5.5/build/cmake
            cmake -B build \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_C_COMPILER=${{ matrix.cross }}-gcc \
              -DZSTD_BUILD_STATIC=ON \
              -DZSTD_BUILD_SHARED=OFF \
              -DCMAKE_INSTALL_PREFIX=$HOME/deps/zstd
            cmake --build build -j$(nproc)
            cmake --install build
          fi

      - name: Build n3n
        run: |
          ./autogen.sh

          CONFIGURE_OPTS="--host=${{ matrix.cross }} --enable-pthread"

          if [ "${{ inputs.enable_openssl }}" = "true" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --with-openssl=$HOME/deps/openssl"
          fi

          if [ "${{ inputs.enable_zstd }}" = "true" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --with-zstd=$HOME/deps/zstd"
          fi

          ./configure $CONFIGURE_OPTS
          make -j$(nproc) all

      - name: Strip binaries
        run: |
          ${{ matrix.cross }}-strip apps/n3n-edge apps/n3n-supernode

      - name: UPX compression
        if: inputs.upx
        uses: crazy-max/ghaction-upx@v4
        with:
          files: |
            apps/n3n-edge
            apps/n3n-supernode

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binaries
          path: |
            apps/n3n-edge
            apps/n3n-supernode

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.target }}
          cp apps/n3n-edge apps/n3n-supernode dist/${{ matrix.target }}/
          cp doc/edge.conf.sample doc/supernode.conf.sample doc/community.list.sample dist/${{ matrix.target }}/
          cp scripts/n3nctl dist/${{ matrix.target }}/
          cd dist/${{ matrix.target }}
          tar czf ../${{ matrix.target }}.tar.gz *

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-package
          path: dist/${{ matrix.target }}.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64

          echo "CC=x86_64-w64-mingw32-gcc" >> $GITHUB_ENV
          echo "CXX=x86_64-w64-mingw32-g++" >> $GITHUB_ENV
          echo "AR=x86_64-w64-mingw32-ar" >> $GITHUB_ENV
          echo "RANLIB=x86_64-w64-mingw32-ranlib" >> $GITHUB_ENV
          echo "STRIP=x86_64-w64-mingw32-strip" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/deps
          key: deps-windows-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Build OpenSSL
        if: inputs.enable_openssl
        run: |
          mkdir -p ~/deps/openssl
          if [ ! -f ~/deps/openssl/lib/libssl.a ]; then
            wget -q https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz
            tar xf openssl-1.1.1w.tar.gz
            cd openssl-1.1.1w
            ./Configure mingw64 --prefix=$HOME/deps/openssl --cross-compile-prefix=x86_64-w64-mingw32- no-shared no-quic
            make -j$(nproc)
            make install
          fi

      - name: Build ZSTD
        if: inputs.enable_zstd
        run: |
          mkdir -p ~/deps/zstd
          if [ ! -f ~/deps/zstd/lib/libzstd.a ]; then
            wget -q https://github.com/facebook/zstd/releases/download/v1.5.5/zstd-1.5.5.tar.gz
            tar xf zstd-1.5.5.tar.gz
            cd zstd-1.5.5/build/cmake
            cmake -B build \
              -DCMAKE_SYSTEM_NAME=Windows \
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
              -DZSTD_BUILD_STATIC=ON \
              -DZSTD_BUILD_SHARED=OFF \
              -DCMAKE_INSTALL_PREFIX=$HOME/deps/zstd
            cmake --build build -j$(nproc)
            cmake --install build
          fi

      - name: Build n3n
        run: |
          ./autogen.sh

          CONFIGURE_OPTS="--host=x86_64-w64-mingw32"

          if [ "${{ inputs.enable_openssl }}" = "true" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --with-openssl=$HOME/deps/openssl"
          fi

          if [ "${{ inputs.enable_zstd }}" = "true" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --with-zstd=$HOME/deps/zstd"
          fi

          ./configure $CONFIGURE_OPTS
          make -j$(nproc) all

      - name: Strip binaries
        run: |
          x86_64-w64-mingw32-strip apps/n3n-edge.exe apps/n3n-supernode.exe

      - name: UPX compression
        if: inputs.upx
        uses: crazy-max/ghaction-upx@v4
        with:
          files: |
            apps/n3n-edge.exe
            apps/n3n-supernode.exe

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-binaries
          path: |
            apps/n3n-edge.exe
            apps/n3n-supernode.exe

      - name: Package
        run: |
          mkdir -p dist/windows-x86_64
          cp apps/n3n-edge.exe apps/n3n-supernode.exe dist/windows-x86_64/
          cp doc/edge.conf.sample doc/supernode.conf.sample doc/community.list.sample dist/windows-x86_64/
          cd dist/windows-x86_64
          zip ../windows-x86_64.zip *

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-package
          path: dist/windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    if: inputs.rel == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -name "*.zip" -exec cp {} release/ \;

          # Generate tag if not provided
          if [ -z "${{ inputs.tag }}" ]; then
            TAG="v$(date +%Y%m%d%H%M)"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: N3N Build ${{ env.TAG }}
          files: release/*
          prerelease: true